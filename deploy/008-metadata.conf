<VirtualHost *:80>
    ServerName metadata.iclexi.tech

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "metadata.iclexi.tech"

    ProxyPass / http://127.0.0.1:8873/ timeout=300 retry=0
    ProxyPassReverse / http://127.0.0.1:8873/

    ErrorLog ${APACHE_LOG_DIR}/metadata-error.log
    CustomLog ${APACHE_LOG_DIR}/metadata-access.log combined
</VirtualHost>
